name: Build for Appetize

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Simulator Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_27.0.app/Contents/Developer

      - name: Install xcpretty
        run: gem install xcpretty --no-document --quiet

      - name: List available simulators
        run: xcrun simctl list devices

      - name: List project schemes and targets
        run: xcodebuild -list -project storytime.xcodeproj

      - name: Build (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project storytime.xcodeproj \
            -scheme storytime \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty --color

      - name: Zip .app for Appetize
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../storytime-simulator.zip storytime.app
          echo "Archive size: $(du -sh ../../../../storytime-simulator.zip | cut -f1)"

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: storytime-simulator
          path: storytime-simulator.zip
          retention-days: 30
