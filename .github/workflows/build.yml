name: Appetize Build
on: [push]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build for Simulator
        run: xcodebuild build -project storytime.xcodeproj -scheme storytime -destination 'platform=iOS Simulator,name=iPhone 16' CODE_SIGNING_ALLOWED=NO
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: storytime-simulator
          path: build/Build/Products/Debug-iphonesimulator/*.app
