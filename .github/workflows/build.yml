name: Appetize Build
on: [push]
jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Pre-boot Simulator
        run: xcrun simctl boot "0590F9FF-4A60-4F22-A8ED-F88F08630BF3" || true

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project storytime.xcodeproj \
            -scheme storytime \
            -destination 'platform=iOS Simulator,id=0590F9FF-4A60-4F22-A8ED-F88F08630BF3' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
          2>&1 | tee build.log

      - name: Show errors from log
        if: always()
        run: grep -E "error:|BUILD FAILED" build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload to Appetize
        uses: actions/upload-artifact@v4
        with:
          name: storytime-simulator
          path: build/Build/Products/Debug-iphonesimulator/*.app
